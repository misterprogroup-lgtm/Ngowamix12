services:
  postgres:
    image: postgres:16-alpine
    container_name: ngowamix-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ngowamix
      POSTGRES_PASSWORD: ngowamix_dev_2026
      POSTGRES_DB: ngowamix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ngowamix"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
